[pytest]
testpaths = tests
markers =
    data_plane: Data plane (S3 API) tests
    management: Management plane (admin API) tests
    gui: GUI (web console) tests
addopts = -v --tb=short
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
